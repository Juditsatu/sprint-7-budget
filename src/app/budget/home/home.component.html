<div class="container">

    <h1>Que vols fer?</h1>

    <div class="form-check" *ngFor="let budget of budgets">
      <input class="form-check-input" type="checkbox" value="" (change)="toggleEditable($event)">
      <label class="form-check-label"  for="flexCheckChecked"> 
        {{ budget.option }} ({{ budget.price }} €) 
      </label>
    </div>
    
    <div class="fs-5 pt-2">
      <p>Preu: 
        <span class="badge bg-primary text-wrap">
        {{ totalPrice | number }} €
        </span>
      </p>
    </div>
  
</div>
